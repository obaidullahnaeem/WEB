<!DOCTYPE html>

<html lang="en">  
<!-- complete structute of a basic HTML document -->
<head>    
<!--head is invisible part of webpage only talks to browser-->
    <meta charset="UTF-8">  
    <!-- teels computer to convert the raw computer code into readable text -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>
        My First Web Page 
        </title>
<!-- title of the file , convert index.html to this -->

</head>

<body>
    <h1>Hello, World!</h1>
    <p>This is my first HTML page.</p>
    <h2>Bye World!</h2>
</body>
</html>
